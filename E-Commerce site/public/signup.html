<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Join Nova Studioz today</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px">
      <button class="social-btn" id="googleBtn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign up with Google
      </button>
    </div>
    <div class="auth-divider"><span>or create with email</span></div>
    <form class="auth-form" id="signupForm" style="margin-top:20px">
      <div><label class="input-label">Full Name</label><input class="input-field" type="text" id="signupName" placeholder="Your name" required></div>
      <div><label class="input-label">Email</label><input class="input-field" type="email" id="signupEmail" placeholder="you@email.com" required></div>
      <div><label class="input-label">Phone <span style="color:var(--w20);font-size:10px">(optional)</span></label><input class="input-field" type="tel" id="signupPhone" placeholder="+91 98765 43210"></div>
      <div><label class="input-label">Password</label><input class="input-field" type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6"></div>
      <div id="signupError" style="font-size:12px;color:#ef4444;display:none;padding:8px 12px;background:rgba(239,68,68,0.08);border-radius:6px;border:1px solid rgba(239,68,68,0.2)"></div>
      <button type="submit" class="btn-w" style="width:100%;justify-content:center;margin-top:4px" id="submitBtn">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="/login.html">Sign in</a></p>
  </div>
</div>
<div id="toastCont"></div>
<script src="/js/utils.js?v=10"></script>
<script>
document.getElementById('googleBtn').addEventListener('click', async function() {
  const btn = this;
  btn.disabled = true; btn.textContent = 'Please wait...';
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    const result = await firebase.auth().signInWithPopup(provider);
    // 🔐 Send Firebase ID token — server verifies with Google, email can't be spoofed
    const idToken = await result.user.getIdToken();
    const res = await fetch('/api/google-login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ idToken: idToken })
    });
    const data = await res.json();
    if (!data.token) throw new Error('No token');
    localStorage.setItem('token', data.token);
    toast('Account created!', 'success');
    setTimeout(() => location.href = '/', 500);
  } catch(e) {
    console.error(e);
    toast(e.code === 'auth/popup-blocked' ? 'Allow popups for this site.' : 'Google sign up failed.', 'error');
    btn.disabled = false; btn.textContent = 'Sign up with Google';
  }
});

document.getElementById('signupForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('signupError');
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    const res = await fetch('/api/signup', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('signupName').value.trim(),
        email: document.getElementById('signupEmail').value.trim(),
        phone: document.getElementById('signupPhone').value.trim(),
        password: document.getElementById('signupPassword').value
      })
    });
    const data = await res.json();
    if (!res.ok || !data.token) throw new Error(data.error || 'Signup failed');
    localStorage.setItem('token', data.token);
    toast('Account created!', 'success');
    setTimeout(() => location.href = '/', 500);
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Create Account';
  }
});

document.addEventListener('DOMContentLoaded', () => { updateCartUI(); renderCart(); });
</script>
</body>
